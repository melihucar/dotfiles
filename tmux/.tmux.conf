# improve colors
set -g default-terminal 'screen-256color'
set-option -g default-shell /bin/zsh

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# resize panes
bind C-h resize-pane -L 10
bind C-j resize-pane -D 10
bind C-k resize-pane -U 10
bind C-l resize-pane -R 10

# More straight forward key bindings for splitting
unbind %
bind | split-window -h
bind - split-window -v

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
setw -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# Default key repeat is 500ms, lower to 125ms
# otherwise hitting up arrow right after moving to new window counts
# as moving back to window above
set -g repeat-time 126

# don't rename windows automatically
set-option -g allow-rename off

# reload config file
bind r source-file ~/.tmux.conf


######################
### DESIGN CHANGES ###
######################

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity on
set -g bell-action none

# Terminal emulator window title
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

#  modes
setw -g clock-mode-colour colour5
setw -g mode-style 'fg=colour1 bg=colour18 bold'

# panes
set -g pane-border-style fg=colour240,bg=colour0
set -g pane-active-border-style bg=colour0,fg=colour10

# statusbar
set -g status-position top
set -g status-justify left
set -g status-bg black
set -g status-fg white
set -g status-interval 60
set -g status-left-length 30
set -g status-left ''
set -g status-right-length 120
set -g status-right '#[fg=colour242]%a %d %b %R'

setw -g window-status-current-style fg=colour238,bg=colour2,bold
setw -g window-status-current-format ' #I:#[fg=colour230]#W#[fg=colour255]#F '

setw -g window-status-style fg=colour242,bg=colour238
setw -g window-status-format ' #I:#[fg=colour247]#W#[fg=colour244]#F '

setw -g window-status-activity-style bg=colour241,fg=colour255
setw -g window-status-bell-style     bg=colour241,fg=colour255

# messages
set -g message-style fg=colour248,bg=colour234
